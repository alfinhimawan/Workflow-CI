name: ML CI/CD Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python & MLflow
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 pandas scikit-learn matplotlib seaborn
        
    - name: Run MLflow Project (Local env)
      run: |
        cd MLProject
        # Menjalankan MLProject menggunakan env-manager=local karena kita sudah install requirements di atas
        mlflow run . --env-manager=local
        
    - name: Build Docker Image from MLflow
      run: |
        cd MLProject
        # Temukan path direktori model secara otomatis berapapun ID eksperimennya
        MODEL_PATH=$(find mlruns -type d -name "random_forest_model" | head -n 1)
        echo "Building docker image for Model Path: $MODEL_PATH"
        # Membangun Docker image menggunakan mlflow build-docker
        mlflow models build-docker -m "$MODEL_PATH" -n telco-churn-model:latest
        
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Tag and Push Docker Image
      run: |
        docker tag telco-churn-model:latest ${{ secrets.DOCKER_USERNAME }}/telco-churn-model:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/telco-churn-model:latest

    - name: Upload MLflow Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-artifacts
        path: MLProject/mlruns/
