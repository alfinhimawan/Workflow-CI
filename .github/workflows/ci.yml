name: CI - Iris ML Training Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      n_estimators:
        description: 'Number of estimators for Random Forest'
        required: false
        default: '100'
      max_depth:
        description: 'Max depth for Random Forest (None for unlimited)'
        required: false
        default: 'None'

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Working directory: $(pwd)"
          echo "Files: $(ls -la)"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.6.0 pandas==2.2.3 \
                      numpy==2.2.1 matplotlib==3.10.0 seaborn==0.13.2 \
                      joblib==1.4.2 dagshub==0.3.40
      
      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TRACKING_PASSWORD }}" >> $GITHUB_ENV
      
      - name: Run mlflow project
        env:
          N_ESTIMATORS: ${{ github.event.inputs.n_estimators || '100' }}
          MAX_DEPTH: ${{ github.event.inputs.max_depth || 'None' }}
          RANDOM_STATE: '42'
        run: |
          cd MLProject
          mlflow run . \
            -P n_estimators=${N_ESTIMATORS} \
            -P max_depth=${MAX_DEPTH} \
            -P random_state=${RANDOM_STATE} \
            --env-manager=local \
            --experiment-name "Iris CI Pipeline - Alfin Himawan Santosa"
      
      - name: Get latest MLflow run_id
        run: |
          if [ -f "MLProject/mlflow_run_id.txt" ]; then
            RUN_ID=$(cat MLProject/mlflow_run_id.txt)
            echo "MLflow Run ID: ${RUN_ID}"
            echo "MLFLOW_RUN_ID=${RUN_ID}" >> $GITHUB_ENV
          fi
      
      - name: Install Python dependencies for artifact download
        run: |
          pip install requests
      
      - name: Upload model artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: iris-trained-model-${{ github.run_number }}
          path: |
            MLProject/model_output/
            MLProject/confusion_matrix.png
            MLProject/classification_report.txt
            MLProject/mlflow_run_id.txt
          retention-days: 30
      
      - name: Commit model artifacts to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p model_artifacts
          cp -r MLProject/model_output/* model_artifacts/ 2>/dev/null || true
          cp MLProject/confusion_matrix.png model_artifacts/ 2>/dev/null || true
          cp MLProject/classification_report.txt model_artifacts/ 2>/dev/null || true
          cp MLProject/mlflow_run_id.txt model_artifacts/ 2>/dev/null || true
          git add model_artifacts/
          git diff --staged --quiet || git commit -m "CI: Update model artifacts [run #${{ github.run_number }}] [$(date +'%Y-%m-%d')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Docker Model Image
        run: |
          cd MLProject
          RUN_ID=$(cat mlflow_run_id.txt 2>/dev/null || echo "")
          if [ -n "${RUN_ID}" ]; then
            mlflow models build-docker \
              -m "runs:/${RUN_ID}/model" \
              -n "${{ secrets.DOCKER_USERNAME }}/iris-classification:latest" \
              --enable-mlserver \
              --env-manager=conda
          else
            echo "Skipping Docker build: no run ID found"
          fi
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Tag Docker Image
        run: |
          docker tag "${{ secrets.DOCKER_USERNAME }}/iris-classification:latest" \
            "${{ secrets.DOCKER_USERNAME }}/iris-classification:v${{ github.run_number }}"
      
      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/iris-classification:latest"
          docker push "${{ secrets.DOCKER_USERNAME }}/iris-classification:v${{ github.run_number }}"
          echo "Docker Hub URL: https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/iris-classification" > MLProject/docker_hub_url.txt
          cat MLProject/docker_hub_url.txt
